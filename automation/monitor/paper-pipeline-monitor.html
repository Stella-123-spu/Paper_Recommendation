<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Paper Pipeline Monitor</title>
<style>
:root {
  color-scheme: light;
  --bg: #FAF7F2;
  --card: #FFFFFF;
  --text-1: #2B2A28;
  --text-2: #6B6862;
  --text-3: #9A958D;
  --border: #ECE7DD;
  --border-strong: #DDD6C8;
  --accent: #4A7A6F;
  --accent-hover: #3F6B61;
  --accent-soft: #EEF3F1;
  --warn: #B6822F;
  --warn-soft: #F7EEDC;
  --danger: #B86749;
  --danger-soft: #F6E4DC;
  --success: #5A8C5D;
  --success-soft: #E7EFE5;
  --muted-soft: #F2EFE9;
  --serif: 'Source Serif 4', 'Source Serif Pro', 'Iowan Old Style', 'Lora', 'Georgia', serif;
  --sans: 'Inter', -apple-system, 'SF Pro Text', BlinkMacSystemFont, system-ui, 'PingFang SC', 'Helvetica Neue', sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Roboto Mono', Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { background: var(--bg); }
body {
  margin: 0;
  color: var(--text-1);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: 0.005em;
}
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 28px 80px;
}

/* ---------- Header ---------- */
header {
  margin-bottom: 28px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 0.005em;
  color: var(--text-1);
  line-height: 1.2;
}
.subtitle {
  margin-top: 4px;
  color: var(--text-3);
  font-size: 12px;
  letter-spacing: 0.03em;
}

/* ---------- Card ---------- */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px 28px 26px;
  margin-bottom: 16px;
}
.card-title {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  margin: 0 0 22px;
}

/* ---------- Schedule stats ---------- */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin-bottom: 22px;
}
.stat { display: flex; flex-direction: column; }
.stat-label {
  font-size: 10.5px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 8px;
  font-weight: 500;
}
.stat-value {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 500;
  color: var(--text-1);
  line-height: 1.3;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0;
}
.stat-meta {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
}

/* ---------- Badge ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 4px 11px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.badge.success  { background: var(--success-soft); color: var(--success); }
.badge.success::before  { background: var(--success); }
.badge.warn     { background: var(--warn-soft);    color: var(--warn);    }
.badge.warn::before     { background: var(--warn);    }
.badge.muted    { background: var(--muted-soft);   color: var(--text-2);  }
.badge.muted::before    { background: var(--text-3);  }
.badge.danger   { background: var(--danger-soft);  color: var(--danger);  }
.badge.danger::before   { background: var(--danger);  }

/* ---------- Log ---------- */
.log {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--text-2);
  background: #F5F2EC;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  white-space: pre-wrap;
  max-height: 156px;
  overflow-y: auto;
  line-height: 1.7;
  letter-spacing: 0;
}
.log-mute { color: var(--text-3); }
.log-skip { color: var(--warn); }
.log-run  { color: var(--success); }

/* ---------- Buttons ---------- */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 7px;
  border: 1px solid var(--border-strong);
  background: var(--card);
  color: var(--text-1);
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  letter-spacing: 0.015em;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  line-height: 1.2;
}
.btn:hover {
  background: #F5F2EC;
  border-color: var(--text-3);
}
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #FFFFFF;
}
.btn.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
  color: #FFFFFF;
}
.btn .arrow {
  font-size: 11px;
  opacity: 0.7;
}

/* ---------- Form ---------- */
.field { margin-bottom: 18px; }
.field:last-child { margin-bottom: 0; }
.field-label {
  display: block;
  font-size: 10.5px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 7px;
  font-weight: 500;
}
.field-help {
  font-size: 11.5px;
  color: var(--text-3);
  margin-top: 6px;
  letter-spacing: 0.01em;
  line-height: 1.55;
}
.input, .select {
  width: 100%;
  font-family: var(--sans);
  font-size: 13.5px;
  padding: 9px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  background: var(--card);
  color: var(--text-1);
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 0.01em;
}
.input:focus, .select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(74, 122, 111, 0.10);
}
.field-row {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px;
}

/* ---------- Toggle ---------- */
.toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12.5px;
  color: var(--text-2);
  cursor: pointer;
  letter-spacing: 0.01em;
}
.toggle input {
  appearance: none;
  -webkit-appearance: none;
  width: 32px;
  height: 18px;
  background: var(--border-strong);
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  transition: background 0.15s ease;
  margin: 0;
  flex-shrink: 0;
}
.toggle input::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: white;
  border-radius: 50%;
  transition: transform 0.18s ease;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
}
.toggle input:checked { background: var(--accent); }
.toggle input:checked::after { transform: translateX(14px); }

/* ---------- Empty state ---------- */
.empty {
  text-align: center;
  padding: 20px 12px;
  color: var(--text-3);
  font-size: 12.5px;
  line-height: 1.7;
}
.empty code {
  font-family: var(--mono);
  font-size: 11.5px;
  background: var(--muted-soft);
  padding: 2px 7px;
  border-radius: 4px;
  color: var(--text-2);
}

/* ---------- Misc ---------- */
hr.sep {
  border: none;
  border-top: 1px solid var(--border);
  margin: 22px 0;
}
.actions-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

/* ---------- Toast ---------- */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--text-1);
  color: #FBFAF7;
  font-size: 12.5px;
  letter-spacing: 0.02em;
  padding: 10px 18px;
  border-radius: 999px;
  box-shadow: 0 4px 16px rgba(43, 42, 40, 0.18);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index: 1000;
  max-width: 90vw;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast .kbd {
  display: inline-block;
  font-family: var(--mono);
  font-size: 11px;
  background: rgba(255,255,255,0.16);
  padding: 1px 6px;
  border-radius: 4px;
  margin: 0 2px;
}

@media (max-width: 560px) {
  .status-grid, .field-row { grid-template-columns: 1fr; }
  .container { padding: 28px 18px 60px; }
  header { flex-direction: column; }
  .card { padding: 22px 20px; }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="title">Paper Pipeline</div>
      <div class="subtitle">每 3 天 · launchd 触发 · 66h 节流</div>
    </div>
    <div id="overall-badge">
      <span class="badge muted">加载中</span>
    </div>
  </header>

  <!-- ============== Status Card ============== -->
  <div class="card">
    <div class="card-title">Schedule</div>

    <div class="status-grid">
      <div class="stat">
        <div class="stat-label">下次真跑</div>
        <div class="stat-value" id="next-run-value">—</div>
        <div class="stat-meta" id="next-run-meta"></div>
      </div>
      <div class="stat">
        <div class="stat-label">上次真跑</div>
        <div class="stat-value" id="last-run-value">—</div>
        <div class="stat-meta" id="last-run-meta"></div>
      </div>
    </div>

    <div class="log" id="log-content">
      <span class="log-mute">loading…</span>
    </div>
  </div>

  <!-- ============== Quick Run ============== -->
  <div class="card">
    <div class="card-title">Quick run</div>

    <div class="btn-row">
      <button class="btn primary" data-copy-prompt="paper recommendations from the last 3 days">
        近 3 天论文推荐 <span class="arrow">↵</span>
      </button>
      <button class="btn" data-copy-path="__HOME__/Documents/Paper_Recommendation/skills/_shared/user-config.json">
        编辑 user-config.json
      </button>
      <button class="btn" data-copy-path="__HOME__/Library/Application Support/daily-papers/runner.log">
        查看 runner.log
      </button>
      <button class="btn" data-copy-path="__HOME__/Documents/Obsidian/Research">
        打开 Obsidian Vault
      </button>
    </div>
  </div>

  <!-- ============== Conference Form ============== -->
  <div class="card">
    <div class="card-title">Conference paper search</div>

    <div class="field-row">
      <div class="field">
        <label class="field-label" for="venue">Venue</label>
        <select class="select" id="venue">
          <optgroup label="ML — OpenReview">
            <option value="NeurIPS">NeurIPS</option>
            <option value="ICML">ICML</option>
            <option value="ICLR">ICLR</option>
            <option value="COLM">COLM</option>
            <option value="TMLR">TMLR</option>
          </optgroup>
          <optgroup label="Healthcare — Semantic Scholar">
            <option value="MICCAI">MICCAI</option>
            <option value="CHIL">CHIL</option>
            <option value="MLHC">MLHC</option>
            <option value="AMIA">AMIA</option>
            <option value="IPMI">IPMI</option>
            <option value="MIDL">MIDL</option>
            <option value="ISBI">ISBI</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label class="field-label" for="year">Year</label>
        <input class="input" id="year" type="text" inputmode="numeric" placeholder="2025">
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="topic">Topic query <span style="text-transform:none; letter-spacing:0; color: var(--text-3); font-weight: 400;">（可选）</span></label>
      <input class="input" id="topic" type="text" placeholder="medical imaging / EHR foundation models / …">
      <div class="field-help">缩窄会议内部的主题，留空就拉整个会议。</div>
    </div>

    <div class="field" id="filter-field">
      <label class="toggle">
        <input type="checkbox" id="filter" checked>
        <span>套用 healthcare topic filter</span>
      </label>
      <div class="field-help">仅 ML 会议有效。关掉就返回未过 healthcare 筛子的整个 venue 排序。</div>
    </div>

    <hr class="sep">

    <div class="btn-row">
      <button class="btn primary" id="btn-conf">会议搜索 <span class="arrow">↵</span></button>
      <span id="prompt-preview" style="font-size: 11.5px; color: var(--text-3); align-self: center; letter-spacing: 0.01em;"></span>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</div>

<script>
const RUNNER_THRESHOLD_HOURS = 66;
const RUNNER_FIRE_HOUR = 9;
const ML_VENUES = ['NeurIPS', 'ICML', 'ICLR', 'COLM', 'TMLR'];

const STATUS_PATH = '__HOME__/Documents/Paper_Recommendation/.status';
let statusReady = false;

// ---------- helpers ----------
function pad(n) { return String(n).padStart(2, '0'); }

function fmtLocal(date) {
  if (!date) return '—';
  const y = date.getFullYear();
  const m = pad(date.getMonth() + 1);
  const d = pad(date.getDate());
  const wd = ['周日','周一','周二','周三','周四','周五','周六'][date.getDay()];
  return `${y}-${m}-${d} ${wd} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function fmtRel(date, now) {
  now = now || new Date();
  const diffMs = date - now;
  const abs = Math.abs(diffMs);
  const totalH = Math.floor(abs / 3600000);
  const d = Math.floor(totalH / 24);
  const rh = totalH % 24;
  const min = Math.floor((abs % 3600000) / 60000);
  const past = diffMs < 0;
  let s;
  if (d > 0) s = rh > 0 ? `${d} 天 ${rh} 小时` : `${d} 天`;
  else if (totalH > 0) s = `${totalH} 小时`;
  else s = `${min} 分钟`;
  return past ? `${s}前` : `还有 ${s}`;
}

function todayLocalDate() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function unwrap(result) {
  if (result == null) return '';
  if (typeof result === 'string') return result;
  if (typeof result.content === 'string') return result.content;
  if (Array.isArray(result.content) && result.content[0] && result.content[0].text) {
    return result.content[0].text;
  }
  if (result.text) return result.text;
  try { return JSON.stringify(result); } catch (e) { return String(result); }
}

function setBadge(el, kind, text) {
  el.innerHTML = `<span class="badge ${kind}">${text}</span>`;
}

function computeNextRun(lastEpochSec) {
  const earliest = new Date((lastEpochSec + RUNNER_THRESHOLD_HOURS * 3600) * 1000);
  const candidate = new Date(earliest);
  candidate.setHours(RUNNER_FIRE_HOUR, 0, 0, 0);
  if (candidate < earliest) {
    candidate.setDate(candidate.getDate() + 1);
  }
  return candidate;
}

function parseLogToday(logText) {
  const today = todayLocalDate();
  const lines = logText.split('\n').filter(l => l.indexOf(`[${today}`) !== -1);
  if (lines.length === 0) return { state: 'waiting' };

  const ran = lines.find(l => /\] (start|end):/.test(l));
  if (ran) return { state: 'ran', lines };

  const skipped = lines.find(l => /\] skip:/.test(l));
  if (skipped) return { state: 'skipped', lines };

  return { state: 'unknown', lines };
}

function colorizeLogLine(line) {
  if (/\] skip:/.test(line)) return `<span class="log-skip">${escapeHtml(line)}</span>`;
  if (/\] (start|end):/.test(line)) return `<span class="log-run">${escapeHtml(line)}</span>`;
  return `<span class="log-mute">${escapeHtml(line)}</span>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// ---------- data fetching ----------
async function loadStatus() {
  const badgeEl = document.getElementById('overall-badge');

  let lastEpoch = null;
  let logText = '';

  // vault MCP returns an in-band error string instead of throwing when a file
  // is missing — pattern-match common forms so they don't bleed into the UI.
  const ERR_RE = /(does not exist|not found|no such file|access denied|cannot access)/i;
  const isErr = (s) => !s || ERR_RE.test(s);

  try {
    const r = await window.cowork.callMcpTool('mcp__vault__read_text_file', {
      path: STATUS_PATH + '/last-run'
    });
    const t = unwrap(r).trim();
    if (!isErr(t)) {
      const parsed = parseInt(t, 10);
      if (Number.isFinite(parsed)) lastEpoch = parsed;
    }
  } catch (e) {
    console.error('read last-run failed', e);
  }

  try {
    const r = await window.cowork.callMcpTool('mcp__vault__read_text_file', {
      path: STATUS_PATH + '/runner.log',
      tail: 30
    });
    const t = unwrap(r);
    if (!isErr(t)) logText = t;
  } catch (e) {
    console.error('read runner.log failed', e);
  }

  if (lastEpoch === null && !logText) {
    setBadge(badgeEl, 'muted', '未同步');
    document.getElementById('log-content').innerHTML = `
      <div class="empty">
        Cowork 不允许挂 <code>~/Library/Application Support/</code>，所以需要 runner.sh 把状态镜像到 <code>Paper_Recommendation/.status/</code>。<br>
        在 runner.sh 末尾加 4 行 <code>cp</code> 同步即可。bootstrap 命令见对话中。
      </div>`;
    document.getElementById('next-run-value').textContent = '—';
    document.getElementById('last-run-value').textContent = '—';
    return;
  }

  // ----- next / last -----
  if (lastEpoch) {
    const lastDate = new Date(lastEpoch * 1000);
    const nextDate = computeNextRun(lastEpoch);
    document.getElementById('last-run-value').textContent = fmtLocal(lastDate);
    document.getElementById('last-run-meta').textContent = fmtRel(lastDate);
    document.getElementById('next-run-value').textContent = fmtLocal(nextDate);
    document.getElementById('next-run-meta').textContent = fmtRel(nextDate);
  } else {
    document.getElementById('last-run-value').textContent = '尚无记录';
    document.getElementById('next-run-value').textContent = '—';
  }

  // ----- today badge -----
  const today = parseLogToday(logText);
  if (today.state === 'ran') {
    setBadge(badgeEl, 'success', '今天已运行');
  } else if (today.state === 'skipped') {
    setBadge(badgeEl, 'warn', '今天已 skip');
  } else if (today.state === 'unknown') {
    setBadge(badgeEl, 'muted', '今天有动作');
  } else {
    setBadge(badgeEl, 'muted', '等待 fire');
  }

  // ----- log tail -----
  const logEl = document.getElementById('log-content');
  const recent = logText.split('\n').filter(Boolean).slice(-8);
  if (recent.length === 0) {
    logEl.innerHTML = `<span class="log-mute">runner.log 为空</span>`;
  } else {
    logEl.innerHTML = recent.map(colorizeLogLine).join('\n');
  }
}

// ---------- button wiring ----------
function buildConfPrompt() {
  const venue = document.getElementById('venue').value;
  const year = document.getElementById('year').value.trim();
  const topic = document.getElementById('topic').value.trim();
  const filter = document.getElementById('filter').checked;

  let prompt;
  if (topic) {
    prompt = `${venue} ${year} papers on ${topic}`;
  } else {
    prompt = `papers from ${venue} ${year}`;
  }
  if (ML_VENUES.indexOf(venue) !== -1 && !filter) {
    prompt += `（请加 --no-topic-filter，跳过 healthcare 筛子）`;
  }
  return { prompt, year };
}

function refreshPromptPreview() {
  const { prompt, year } = buildConfPrompt();
  const el = document.getElementById('prompt-preview');
  if (!year) {
    el.textContent = '需要填 year';
  } else {
    el.textContent = prompt;
  }
}

// ---------- clipboard helpers ----------
// Artifacts can't push text into the chat directly (no sendPrompt API), and
// computer:// links don't navigate from inside the iframe — so every action
// copies the relevant text and shows a toast telling the user what to do next.
async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (_) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (_) {}
    document.body.removeChild(ta);
    return ok;
  }
}

let toastTid;
function showToast(html) {
  const t = document.getElementById('toast');
  t.innerHTML = html;
  t.classList.add('show');
  clearTimeout(toastTid);
  toastTid = setTimeout(() => t.classList.remove('show'), 2800);
}

async function handleCopyPrompt(text) {
  const ok = await copyText(text);
  if (ok) showToast(`已复制 prompt — 聊天框 <span class="kbd">⌘V</span> 运行`);
  else    showToast('复制失败，请手动输入');
}

async function handleCopyPath(path) {
  const ok = await copyText(path);
  if (ok) showToast(`已复制路径 — Finder <span class="kbd">⌘⇧G</span> 粘贴打开`);
  else    showToast('复制失败');
}

// Wire all data-copy-prompt / data-copy-path buttons
document.querySelectorAll('[data-copy-prompt]').forEach(el => {
  el.addEventListener('click', () => handleCopyPrompt(el.dataset.copyPrompt));
});
document.querySelectorAll('[data-copy-path]').forEach(el => {
  el.addEventListener('click', () => handleCopyPath(el.dataset.copyPath));
});

// Conference button: dynamic prompt
document.getElementById('btn-conf').addEventListener('click', () => {
  const { prompt, year } = buildConfPrompt();
  if (!year) {
    document.getElementById('year').focus();
    showToast('请先填年份');
    return;
  }
  handleCopyPrompt(prompt);
});

// venue change → toggle filter visibility + preview
function updateFilterVisibility() {
  const venue = document.getElementById('venue').value;
  document.getElementById('filter-field').style.display =
    ML_VENUES.indexOf(venue) !== -1 ? '' : 'none';
}

['venue','year','topic','filter'].forEach(id => {
  document.getElementById(id).addEventListener('input', refreshPromptPreview);
  document.getElementById(id).addEventListener('change', () => {
    updateFilterVisibility();
    refreshPromptPreview();
  });
});

// ---------- init ----------
document.getElementById('year').value = new Date().getFullYear().toString();
updateFilterVisibility();
refreshPromptPreview();
loadStatus();
</script>
</body>
</html>
